<!DOCTYPE html>
<html>
<head>
    <title>Live Text Display</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f6f8;
        }

        input{
            padding: 10px;
            font-size: 16px;
            width: 250px;
        }

        p{
            font-size: 20px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h2>Live Text Display</h2>

<input 
type="text" 
id="textInput" 
placeholder="Type something..." 
oninput="displayText()">

<p id="output">You typed → </p>

<script>
function displayText() {
    let text = document.getElementById("textInput").value;
    document.getElementById("output").innerHTML = "You typed → " + text;
}
</script>

</body>
</html>
